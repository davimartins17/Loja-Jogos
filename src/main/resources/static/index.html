<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Jogos</title>
    <style>
        header{
        display: flex;
        justify-content: center;
        background: linear-gradient(to right, red, orange, yellow);
        }
        .cadastro{
            display: flex;
            justify-content: center;
            width: 100%;
            flex-direction: column;
        }
        .cadastro input{
            width:50%;
        }
    </style>
</head>
<body>
<header>
    <h1><a href="ListaJogos.html" style="text-decoration: none;">Loja de Jogos</a> </h1>
</header>
<form>
    <div style="display: flex; justify-self: center; flex-direction: column; width:50%; border: 1px solid black; padding: 20px 20px 20px 20px; border-radius: 10px; margin-top:20px;">
    <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="Text" class="form-control" id="nome" aria-describedby="nome">
    </div>
    <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Preço</label>
        <input type="number" class="form-control" id="exampleInputPassword1">
    </div>

        <div class="form-floating">
            <select class="form-select" style="padding: 10px 10px 10px 10px;">
                <option selected>Categoria</option>
                <option value="1">Ação</option>
                <option value="2">Luta</option>
                <option value="3">RPG</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
    </div>
</form>
<footer style="display: flex;width:100%; height:50px;position: fixed;bottom: 0;background:linear-gradient(to right, red, orange, yellow);  ">
</footer>

</body>
</html>
